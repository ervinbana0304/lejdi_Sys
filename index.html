    <script>
        function sendMail() {
            let params = {

                f_name: document.getElementById("f-name").value,
                f_company: document.getElementById("f-company").value,
                f_email: document.getElementById("f-email").value,
                f_phone: document.getElementById("f-phone").value,
                f_service: document.getElementById("f-service").value,
                f_message: document.getElementById("f-message").value,
            }
            const name = document.getElementById('f-name').value.trim();
            const email = document.getElementById('f-email').value.trim();
            const phone = document.getElementById('f-phone').value.trim();
            const service = document.getElementById('f-service').value.trim();

            // Email regex (basic but solid)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // Phone regex (numbers only)
            const phoneRegex = /^[0-9]+$/;

            // Check empty
            if (!phone || !email ) {
                alert('Please fill in your phone number and email.');
                return;
            }

     
            // Validate email
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address.');
                return;
            }

            // Validate phone (numbers only)
            if (!phoneRegex.test(phone)) {
                alert('Phone number must contain only numbers.');
                return;
            }

            // Optional: length check (recommended)
            if (phone.length < 7 || phone.length > 15) {
                alert('Phone number must be between 7 and 15 digits.');
                return;
            }
            document.getElementById('form-success').classList.remove('hidden');
            ['f-name', 'f-company', 'f-email', 'f-phone', 'f-message'].forEach(id => { document.getElementById(id).value = ''; });


            emailjs.send("service_jju2ard", "template_1kdfxk9", params).then(alert("Email Sent"))
        }
    </script>
